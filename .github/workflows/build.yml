name: Build Unsigned Safari Extension IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build Unsigned Archive
        run: |
          xcodebuild -project GrokJobAutofill.xcodeproj \
            -scheme GrokJobAutofill \
            -configuration Release \
            -archivePath build/GrokJobAutofill.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=\"\" \
            DEVELOPMENT_TEAM=\"\"

      - name: Create Unsigned IPA (manual zip)
        run: |
          mkdir -p build/ipa
          cd build/GrokJobAutofill.xcarchive/Products/Applications
          zip -r ../../../ipa/GrokJobAutofill-unsigned.ipa GrokJobAutofill.app

      - name: Upload Unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: GrokJobAutofill-unsigned
          path: build/ipa/GrokJobAutofill-unsigned.ipa

      - name: Upload .app (optional)
        uses: actions/upload-artifact@v4
        with:
          name: GrokJobAutofill-app
          path: build/GrokJobAutofill.xcarchive/Products/Applications/