name: GrokJobAutofill
options:
  bundleIdPrefix: com.yourcompany  # CHANGE THIS to your actual bundle ID prefix
  deploymentTarget:
    iOS: 17.0
targets:
  GrokJobAutofill:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.grokjobautofill
    info:
      path: Sources/App/Info.plist
    dependencies:
      - target: GrokJobAutofillExtension

  GrokJobAutofillExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.grokjobautofill.extension
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
    info:
      path: Resources/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
          NSExtensionAttributes:
            NSExtensionActionWantsFullScreenPresentation: false